<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job application form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <form>
            <div class="title">
                <h1>Sample Job Application Form</h1>
                <p>We are in Equal Opportunity Employer andcommitted to excellence through diversity.</p>
            </div>
            <hr>
            <div class="wrap">
                <h2 id="pi">Personal Information</h2>

                <div class="universalClass">
                    <div id="first_name">
                    <label for="fisName">Name</label> 
                    <br>
                    <input type="text" placeholder="First Name" name="First Name" id="fisName">
                    </div>

                    <div id="last_name">
                        <label for="lasName"></label> <br>
                    <input type="text" placeholder="Last Name" id="lasName" name="LastName">
                    </div>
                </div>
                <br>
                <div class="universalClass">
                    <div id="phoneNumber">
                        <label for="phNumber">Phone Number</label> <br>
                        <input type="number" placeholder="+91 00000 00000" name="phoneNumber" id="number-email">
                    </div>
                    <div id="email">
                        <label for="email">Email</label>
                        <br>
                        <input type="email" placeholder="xyz@gmail.com" name="email" id="email">
                    </div>
                </div>
                <br><br><hr>













            </div>
        </form>
    </div>
</body>

</html>
