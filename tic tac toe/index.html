<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tic Tac Toe</h1>
    </header>
    <main>
        <div class="container">
            <div class="content">
                <button class="box">X</button>
                <button class="box">O</button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
    </main>
    

    <section>
        <div id="field-set-div">
        <fieldset id="field-set">
            <legend>Game Options</legend>
            <button class="buttons">Start</button>
            <button class="buttons">Reset</button>
        </fieldset>
        </div>
    </section>


    <script src="game.js"></script>
</body>
</html>
