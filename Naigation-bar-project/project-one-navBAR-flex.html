<head>

    <title>Project - Navigation Bar </title>ṇ
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
body {
    background-color: #BED7D8;
    padding: 0;
}

h1 {

    display: flex;
    justify-content: space-evenly;

    align-content: space-evenly;
}

a {

    color:yellow;

    text-decoration: none;
}

    border: 2px solid white;

} */

button {
    background-color: #f08a04bc;
    height: 35px;
    width: 120px;
    font-size:18px;

    border-radius: 30px;
    font-family: arial, sans-serif;

input {
    width: 250px;
    height: 30px;
     border-radius: 25px;

     text-align: center;
}

#logo {
    font-size: 25px;

}

        <a href="_blank" target="_blank"> <i class="fa-solid fa-circle-user nav-icon"></i>Account</a>

        <a href="_blank" target="_blank"><i class="fa-solid fa-cart-arrow-down nav-icon"></i>My Cart</a>

        <a href="_blank" target="_blank"><i class="fa-solid fa-address-book nav-icon"></i>Contact us</a>
        
        <div class="search-box">

            <input placeholder="Search Any Product">
            <button>Search</button>
