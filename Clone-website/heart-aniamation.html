<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body {
            background-color: black;
        }

        div {
            /* background-color: aqua; */
            width: 0;
            height: 0;
            margin: 300px auto;
        }
        .heart {
            color: red;
            font-size: 100px;
            animation: heart 0.4s infinite ease alternate;
        }

        /* @keyframes heart {
            25% {color: red;}
            50% {color: rgba(255, 0, 0, 0.032);}
            75% {color: red; }
            100% {color: rgba(255, 0, 0, 0);  }
        } */

        @keyframes heart {
            from{color: red; transform: scale(2, 2);} 
            to {color: rgba(255, 0, 0, 0.007); transform: scale(3, 3);}
        }
    </style>
</head>
<body>
    <div>
<i class="fa-solid fa-heart heart"></i>
</div>
</body>
</html>
