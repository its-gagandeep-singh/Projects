<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>

body{
    font-family: Arial;
    background-color: #f2f2f2;
}

.container{
    max-width: 350px;
    margin: 100px auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
}

h2{
    text-align: center;
}

input, select{
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

button{
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
}

button:hover{
    background: #45a049;
}

</style>

</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Password</label>
<input type="password" placeholder="Enter password">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
