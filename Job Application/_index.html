<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job application form</title>
    <link rel="stylesheet" href="_style.css" class="rel">
</head>

<body>
    <div class="container">
        <div class="box">
            <form action="">
                <h2 class="title">Sample Job Application Form</h2>
                <p class="title">We are in Equal Opportunity Employer andcommitted to excellence through diversity.</p>
                <hr>

                <h3>Personal Information</h3>

                <div class="group">
                    <label for="fisName">Name</label>
                    <input type="text" placeholder="First Name" name="First Name" id="fisName">

                    <label for="secName">Last Name</label>
                    <input type="text" placeholder="Last Name" name="last Name" id="secName">
                </div>

                <div class="group">
                    <label for="email">Email</label>
                    <input type="email" name="emailId" placeholder="abc@gmail.com" id="email">

                    <label for="ph-number">Phone Number</label>
                    <input type="number" id="ph-number" placeholder="+91 00000 00000" name="phoneNumber">
                </div>

                <div class="group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" placeholder="Enter your address here...." rows="4"
                        cols="55"></textarea>
                </div>

                <div class="group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter City Name" name="city">

                    <label for="pincode">Pincode</label>
                    <input type="number" id="pincode" name="pincode" placeholder="Enter Pincode">
                </div>

                <div class="group">
                    <fieldset>
                        <legend>
                            Gender
                        </legend>
                        <label for="male">Male</label>
                        <input type="radio" id="male" value="Male">

                        <label for="female">Female</label>
                        <input type="radio" id="female" value="Female">
                    </fieldset>

                    <label for="date">Date</label>
                    <input type="date" name="date" id="date">
                </div>

                <div class="group">
                    <label for="role">Select Role</label>
                    <select name="role" id="role">
                        <option value="">Select Job Role</option>
                        <option value="fullstack">Full Stack Developer</option>
                        <option value="frontend">Frontend Developer</option>
                        <option value="backend">Backend Developer</option>
                    </select>

                    <label for="upload">Upload your CV</label>
                    <input type="file" id="upload" name="CV">
                </div>

                <div class="group">
                    <button type="submit">Apply Now</button>
                </div>
                <div class="group">
                    <button type="reset">Reset</button>
                </div>
        </div>
        </form>
</body>

</html>
