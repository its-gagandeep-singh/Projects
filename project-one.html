<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - Navigation Bar </title>
    <!-- <link rel="stylesheet" href="navbar.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
body {
    background-color: #BED7D8;
    padding: 0;
    margin: 0;
    text-align: center;
}

h1 {
    text-align: center;
    font-family: arial, sans-serif;
    font-size: rgb(255, 44, 44);
}

#navbar {
    background-color: #0f1111;
    height: 70px;
    width: 2030px;
    /* width: 1580px; */
    /* margin: 10px 15px 10px 15px; */
    margin: auto;
    border-radius: 80px;
    border: 3px solid rgba(128, 128, 128, 0.5);
}

a {
    font-size: 25px;
    background-color: #0f1111;
    color:yellow; 
    text-align: center;
    margin: 0 90px;
    font-family:system-ui;
    text-decoration: none;
}
a:hover {
    border: 3px solid white;
    padding: 7px 20px;

}

button {
    background-color: #f08a04bc;
    height: 35px;
    width: 120px;
    font-size:18px;
    margin: 12px;
    padding: 1px 15px 1px 15px;
    /* text-align: center;  */
    border-radius: 30px;
    font-family: arial, sans-serif;
}

input {
    width: 250px;
    height: 30px;
     border-radius: 25px;
     text-align: center;
     /* padding: 0 10px; */
     font-size: 18px;
}

#logo {
    font-size: 25px;
    color: #f08804;
}


.nav-icon {
    color: rgba(255, 255, 255, 0.532);
    /* font-size: #; */
    padding: 21px 0;
    margin: 0 20px;
}

.nav-icon:nth-child(5) {
    font-size: 29px;
    /* padding: 20px 0; */
}
.nav-icon:hover {
    color: rgb(255, 255, 255);
}
</style>
</head>
<body>
    <h1>Navigation Bar (Amazon)</h1>
    <div id="navbar">
        <a href="https://www.amazon.in/ " target="_blank" id="logo">
            <i class="fa-solid fa-globe nav-icon"></i>
            Amazon.in</a>
                    
        <a href="_blank" target="_blank"> <i class="fa-solid fa-circle-user nav-icon"></i>Account</a>

        <a href="_blank" target="_blank"><i class="fa-solid fa-cart-arrow-down nav-icon"></i>My Cart</a>

        <a href="_blank" target="_blank"><i class="fa-solid fa-address-book nav-icon"></i>Contact us</a>
        
        <i class="fa-solid fa-magnifying-glass nav-icon"></i>
            <input placeholder="Search Any Product">
            <button>Search</button>
</body>
</html>
