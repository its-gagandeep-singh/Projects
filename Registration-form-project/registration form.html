<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
    <style>
        * {
            font-family:monospace;
            border: border-box;
        }
        body {
            font-size: 19px;
            background-color: black;
            color: white;
        }

        form {
            border: 3px solid grey;
            border-radius: 15px;
            width: 560px;
            height: 650px;
            /* text-align: center; */
            padding-left: 70px;
            margin: 90px auto;
        }

        div {
            padding-top: 35px;
        }
        div>input , select {
            margin-left: 20px;
            text-align: center;
            border-radius: 100px;
            color: black;
            font-weight: 600;
        }

        #d-1>input {margin-left:50px; width: 250px;}
        #d-2>input {margin-left: 18px; width: 250px;}
        #d-3>input {width: 220px}
        #select-age>select {width: 200px;}
        #text-area>textarea {width: 350px; height: 60px; margin-top: 20px;}
        #button-btn {padding-left: 20px; padding-bottom: 20px;}
        #button-btn>button {width: 130px; border-radius: 15px;}

    </style>
</head>
<body>
    <form>
        <h3 style="text-align: center;">Registration Form</h3>
        <div id="d-1">
        <label>Enter Name :</label>
        <input type="text" name="name" placeholder="Type Here....">
        </div>

        <div id="d-2">
        <label>
        Enter Address :
        </label>
        <input type="text" name="address" placeholder="Type Here....">
        </div>
        
        <div id="d-3">
        Enter Contact Number : 
        <input type="number" name="contactNumber" placeholder="Type Here....">
        </div>

        <div id="select-course">
            <label>
                Choose Course : 
            </label>
        <select>
             <option>Select</option>
            <option>AI / ML Full Course</option>
            <option>Full Stack JAVA Devlopment</option>
            <option>Cyber security</option>
            <option>DevOps</option>
        </select>
        <div id="select-age">
        <label>
            Select Age :
        </label>
        <select>
            <option>Select</option>
            <option>12 - 18</option>
            <option>19 - 24</option>
            <option>25 - 30</option>
        </select>
        </div>

        <div id="text-area">
            <label>
                Share Feedback :
            </label>
            <br>
        <textarea type="text" name="feedback" placeholder="Share Your Feedback..."></textarea>
        </div>

        <div id="button-btn">
            <button type="submit">
                <label>
                Submit
                </label>
            </button>
            <button>
                <label>
                Reset
                </label>
            </button>
            </div>
    

</div></form></body></html>
