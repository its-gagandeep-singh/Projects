<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=d, initial-scale=1.0">
    <title>Registration Form </title>
    <style>
    body {
        background-color: grey;
    }   
    h2 {
        text-align: center;


    }    
    form {
        width: 70%;
        height: 1600px;
        background-color: aqua;
        border-radius: 20px;
        border: 2px dotted black;
        margin: 100px auto;
        padding: 150px 0;
    } 

    div {
        width: 1000px;
        height: 120px;
        display: flex;
        flex-direction: column;
        padding: 7px;
        /* border: 2px solid rgb(255, 255, 255); */
    }

    #std-info {
        height: 40px;
        display: flex;
        flex-direction: row;
        /* flex-wrap: wrap; */
        align-items: center;
        font-size: 20px;
        
    }
    #std-info>input {
        width: 250px;
        height: 25px;
        margin: 0 3px;
    }
    #std-info>input:first-child {
        margin-left: 22px;
    }
    /* */

   #addrss-1 {
    display: flex;
    flex-direction: row;
    font-size: 20px;
    word-spacing: 4px;
   }
   #addrss-1>input {
    width: 775px;
    height: 25px;
    margin-left: 114px;
   }



    
   



















    button, select, input, textarea {
        width: 350px;
        border-radius: 15px;
        border: 1px solid black;
        text-align: center;
        word-spacing: 5px;
        
    }

    </style>
</head>
<body>
    <form>
        <h2>Student Registration Form</h2>
        <!-- <div class="outer"> -->
        <div id="std-info"> Student Information : 
            <input type="text" id="nameINPUT" name="Name" placeholder="First Name">
            <input type="text" name="lastname" placeholder="Second Name">
            <input type="text" name="lastname" placeholder="Last Name">
        </div>

        <div id="addrss-1">Address : 
            <input id="adr-1" type="text" name="address" placeholder="Street Address">
            </div><br><div id="addrss-2">
            <input id="adr-2" type="text" name="country" placeholder="Country">
            <input id="adr-3" type="text" name="city" placeholder="City">
            <input id="adr-4" type="text" name="pincode" placeholder="Pin Code">
            <input id="adr-5" type="text" name="state" placeholder="State">
        </div>

        <div id="number">
            Contact Information : 
            <input type="number" min="1" max="100" name="number" placeholder="Contact Number">
            <input type="email" name="email" placeholder="abc@gmail.com">
        </div>

        <div id="menu">
            Choose Subject : 
            <select>
                <option>Select</option>
                <option>C Programming</option>
                <option>HTML</option>
                <option>CSS</option>
                <option>JAVA</option>
            </select>
        Form Submission Date : 
        <input type="date" name="date">
        Conclusion : 
        <textarea rows="4" cols="6" placeholder="Tell about your interest"></textarea>
        </div>

        <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

        <!-- </div> -->
    </form>
</body>
</html>
